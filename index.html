<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Impact Analyzer | EIA Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <h1 class="text-expand-fwd">Eco Impact Analyzer</h1>
        <p class="reveal">Quantifying the footprint of progress for a sustainable future.</p>
        <button class="btn-interactive" onclick="scrollToProject()">Explore Analysis</button>
    </section>
    
    <main class="container">
        <div class="card reveal" id="project-info">
            <h2>Project Overview</h2>
            <p>Welcome to the <strong>Eco Impact Analyzer</strong>. Our team is using this platform to evaluate environmental shifts in air quality, biodiversity, and local ecosystems.</p>
        </div>
        <div class="logo-container">
         <h1 class="tracking-out-expand-fwd">Eco Impact Analyzer</h1>
    
        <svg class="eco-mascot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#2d3436" stroke="#00e676" stroke-width="2"/> <circle cx="35" cy="40" r="10" fill="white"/> <circle cx="35" cy="40" r="5" fill="black" class="blink"/>
          <circle cx="65" cy="40" r="10" fill="white"/> <circle cx="65" cy="40" r="5" fill="black" class="blink"/>
          <polygon points="50,55 45,65 55,65" fill="#ff9100"/> <path d="M30,75 Q50,90 70,75" stroke="#00e676" stroke-width="3" fill="none"/> </svg>
        </div>
    </main>
    <svg class="vine-corner vine-tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path class="vine-path" d="M0,0 C50,20 80,60 100,100 C120,140 160,160 200,200" stroke="#00c853" stroke-width="3" fill="none"/>
        <circle cx="20" cy="15" r="5" fill="#00e676" class="leaf"/>
        <circle cx="60" cy="45" r="7" fill="#00e676" class="leaf"/>
        <circle cx="110" cy="120" r="6" fill="#00e676" class="leaf"/>
    </svg>

    <svg class="vine-corner vine-br" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path class="vine-path" d="M0,0 C50,20 80,60 100,100 C120,140 160,160 200,200" stroke="#00c853" stroke-width="3" fill="none"/>
        <circle cx="30" cy="25" r="6" fill="#00e676" class="leaf"/>
        <circle cx="80" cy="70" r="5" fill="#00e676" class="leaf"/>
        <circle cx="150" cy="155" r="7" fill="#00e676" class="leaf"/>
    </svg>
    
    <script src="script.js"></script>
</body>
</html>
