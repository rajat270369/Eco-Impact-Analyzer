<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Impact Analyzer | EIA Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg class="vine-container tl" viewBox="0 0 200 200">
        <path class="vine-stem" d="M0,0 Q30,10 50,60 T100,120" />
        <path class="leaf" d="M50,60 Q70,40 90,60 Q70,80 50,60" fill="#00e676" />
        <path class="leaf" d="M20,15 Q40,-5 60,15 Q40,35 20,15" fill="#00c853" />
    </svg>

    <section class="hero">
        <div class="logo-wrapper">
            <h1 class="text-expand-fwd">Eco Impact Analyzer</h1>
            <img src="mascot.png" alt="Eco Owl Mascot" class="mascot-3d">
        </div>
        <p class="reveal active">Quantifying the footprint of progress for a sustainable future.</p>
        <button class="btn-interactive">Explore Analysis</button>
    </section>

    <svg class="vine-container br" viewBox="0 0 200 200">
        <path class="vine-stem" d="M200,200 Q170,190 150,140 T100,80" />
        <path class="leaf" d="M150,140 Q130,160 110,140 Q130,120 150,140" fill="#00e676" />
        <path class="leaf" d="M180,185 Q160,205 140,185 Q160,165 180,185" fill="#00c853" />
    </svg>

    <script src="script.js"></script>
</body>
</html>
