<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis | EIA Project</title>
    <link rel="stylesheet" href="analysis.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="analysis-page">
    
    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <mask id="clipping-mask" maskUnits="objectBoundingBox">
          <polygon points="0.5 0, 1 0.25, 1 0.75, 0.5 1, 0 0.75, 0 0.25"></polygon>
          <polygon points="0.5 0.2, 0.8 0.4, 0.8 0.6, 0.5 0.8, 0.2 0.6, 0.2 0.4"></polygon>
        </mask>
      </defs>
    </svg>
    
    <canvas id="rainCanvas" class="container"></canvas>

    <div id="loading-screen">
        <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="eia-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00e676" />
                    <stop id="animatedStop" offset="100%" />
                </linearGradient>
            </defs>
            <path id="bounce" d="M30 20 L50 0 L70 20" fill="none" stroke="#00e676" stroke-width="3" />
        </svg>
    </div>

    <div class="nav-container">
        <button class="btn-17" onclick="window.location.href='index.html'">
            <span class="text-container">
                <span class="text"> BACK </span>
            </span>
        </button>
    </div>

    <main id="analysis-root">
        <div class="dashboard-grid">
            
            <div class="pillar-card" onclick="activateModule('monitor')">
                <div class="loader-container">
                    <div class="loader">
                        <div class="box"></div>
                    </div>
                </div>
                <h3>NEUTRALIZATION</h3>
                <p class="metric-value" id="neutral-val">0% Offset</p>
            </div>

            <div class="pillar-card" onclick="activateModule('analyze')">
                <div class="loader-container">
                    <div class="loader">
                        <div class="box"></div>
                    </div>
                </div>
                <h3>POLLUTION ESTIMATE</h3>
                <p class="metric-value" id="pollution-val">Clear</p>
            </div>

            <div class="pillar-card" onclick="activateModule('strategize')">
                <div class="loader-container">
                    <div class="loader">
                        <div class="box"></div>
                    </div>
                </div>
                <h3>SOCIAL IMPACT</h3>
                <p class="metric-value" id="social-val">Stable</p>
            </div>

            <div class="pillar-card" onclick="activateModule('develop')">
                <div class="loader-container">
                    <div class="loader">
                        <div class="box"></div>
                    </div>
                </div>
                <h3>WASTE GENERATED</h3>
                <p class="metric-value" id="waste-val">0.00kg</p>
            </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="analysis.js"></script> 
</body>
</html>
