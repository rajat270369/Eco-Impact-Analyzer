<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis | EIA Project</title>
    <link rel="stylesheet" href="analysis.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="analysis-page">
    
    <div class="container"></div>

    <div id="loading-screen">
        <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="eia-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00e676" />
                    <stop id="animatedStop" offset="100%" />
                </linearGradient>
            </defs>
            <g id="particles" fill="#00e676">
                <circle cx="20" cy="10" r="1" />
                <circle cx="80" cy="15" r="1" />
                <circle cx="50" cy="5" r="1" />
            </g>
            <path id="bounce" d="M30 20 L50 0 L70 20" fill="none" stroke-width="3" />
            <path id="bounce2" d="M35 30 L50 15 L65 30" fill="none" stroke-width="2" opacity="0.5" />
        </svg>
    </div>

    <div class="nav-container">
        <button class="btn-17" onclick="window.location.href='index.html'">
            <span class="text-container">
                <span class="text"> BACK </span>
            </span>
        </button>
    </div>

   <main id="analysis-root">
    <div class="dashboard-grid">
        
        <div class="pillar-card">
            <button class="button btn-monitor" onclick="activateModule('monitor')"></button>
            <p class="metric-value" id="neutral-val">0% Offset</p>
        </div>

        <div class="pillar-card">
            <button class="button btn-analyze" onclick="activateModule('analyze')"></button>
            <p class="metric-value" id="pollution-val">Clear</p>
        </div>

        <div class="pillar-card">
            <button class="button btn-strategize" onclick="activateModule('strategize')"></button>
            <p class="metric-value" id="social-val">Stable</p>
        </div>

        <div class="pillar-card">
            <button class="button btn-develop" onclick="activateModule('develop')"></button>
            <p class="metric-value" id="waste-val">0.00kg</p>
        </div>

    </div>
</main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="analysis.js"></script> 
</body>
</html>
