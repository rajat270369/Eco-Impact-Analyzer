<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis | EIA Project</title>
    <link rel="stylesheet" href="analysis.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="analysis-page">
    
    <div class="container"></div>

    <div id="loading-screen">
        <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="eia-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00e676" />
                    <stop id="animatedStop" offset="100%" />
                </linearGradient>
            </defs>
            <g id="particles" fill="#00e676">
                <circle cx="20" cy="10" r="1" />
                <circle cx="80" cy="15" r="1" />
                <circle cx="50" cy="5" r="1" />
            </g>
            <path id="bounce" d="M30 20 L50 0 L70 20" fill="none" stroke="#00e676" stroke-width="3" />
            <path id="bounce2" d="M35 30 L50 15 L65 30" fill="none" stroke="#00e676" stroke-width="2" opacity="0.5" />
        </svg>
    </div>

    <div class="nav-container">
        <button class="btn-17" onclick="window.location.href='index.html'">
            <span class="text-container">
                <span class="text"> BACK </span>
            </span>
        </button>
    </div>

    <main id="analysis-root">
       <div class="dashboard-grid">
        
        <div class="pillar-group">
            <div class="pillar-card" onclick="activateModule('monitor')">
                <div class="mascot-wrapper">
                    <svg class="eco-fox" viewBox="0 0 100 100">
                        <path d="M70,70 Q90,50 70,30" fill="none" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
                        <path d="M30,80 Q50,90 70,80 L70,50 Q50,40 30,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <path d="M35,50 L50,20 L65,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <circle cx="45" cy="40" r="2" fill="#00e676" />
                        <circle cx="55" cy="40" r="2" fill="#00e676" />
                    </svg>
                </div>
            </div>
            <button class="btn cube" type="button" onclick="runAnalysis()">
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
                <div class="text">MONITOR</div>
            </button>
        </div>

        <div class="pillar-group">
            <div class="pillar-card" onclick="activateModule('analyze')">
                <div class="mascot-wrapper">
                    <svg class="eco-fox" viewBox="0 0 100 100">
                        <path d="M70,70 Q90,50 70,30" fill="none" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
                        <path d="M30,80 Q50,90 70,80 L70,50 Q50,40 30,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <path d="M35,50 L50,20 L65,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <circle cx="45" cy="40" r="2" fill="#00e676" />
                        <circle cx="55" cy="40" r="2" fill="#00e676" />
                    </svg>
                    </div>
            </div>
            <button class="btn cube" type="button" onclick="runAnalysis()">
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
                <div class="text">ANALYZE</div>
            </button>
        </div>

        <div class="pillar-group">
            <div class="pillar-card" onclick="activateModule('strategize')">
                <div class="mascot-wrapper">
                    <svg class="eco-fox" viewBox="0 0 100 100">
                        <path d="M70,70 Q90,50 70,30" fill="none" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
                        <path d="M30,80 Q50,90 70,80 L70,50 Q50,40 30,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <path d="M35,50 L50,20 L65,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <circle cx="45" cy="40" r="2" fill="#00e676" />
                        <circle cx="55" cy="40" r="2" fill="#00e676" />
                    </svg>
                    </div>
            </div>
            <button class="btn cube" type="button">
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
                <div class="text">STRATEGIZE</div>
            </button>
        </div>

        <div class="pillar-group">
            <div class="pillar-card" onclick="activateModule('develop')">
                <div class="mascot-wrapper">
                    <svg class="eco-fox" viewBox="0 0 100 100">
                        <path d="M70,70 Q90,50 70,30" fill="none" stroke="#00e676" stroke-width="4" stroke-linecap="round"/>
                        <path d="M30,80 Q50,90 70,80 L70,50 Q50,40 30,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <path d="M35,50 L50,20 L65,50 Z" fill="#1a1a1a" stroke="#00e676" stroke-width="2"/>
                        <circle cx="45" cy="40" r="2" fill="#00e676" />
                        <circle cx="55" cy="40" r="2" fill="#00e676" />
                    </svg>
                    </div>
            </div>
            <button class="btn cube" type="button">
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
                <div class="text">DEVELOP</div>
            </button>
        </div>

    </div>

        <div class="analysis-container">
            <div class="input-grid">
                <div class="input-group">
                    <label>Diesel (Liters)</label>
                    <input type="number" id="diesel-input" placeholder="0">
                </div>
                <div class="input-group">
                    <label>Electricity (kWh)</label>
                    <input type="number" id="elec-input" placeholder="0">
                </div>
                <div class="input-group">
                    <label>Concrete (m³)</label>
                    <input type="number" id="concrete-input" placeholder="0">
                </div>
                <div class="input-group">
                    <label>Plastic (kg)</label>
                    <input type="number" id="plastic-input" placeholder="0">
                </div>
            </div>

            <div id="results-display" class="results-grid" style="display: none;">
                <div class="result-card">
                    <span class="label">Air Pollution</span>
                    <span id="res-air" class="value">0</span>
                </div>
                <div class="result-card">
                    <span class="label">Solid Waste</span>
                    <span id="res-waste" class="value">0</span>
                </div>
                <div class="result-card">
                    <span class="label">CO2 Emissions</span>
                    <span id="res-co2" class="value">0</span>
                </div>
                <div class="result-card">
                    <span class="label">Impact Score</span>
                    <span id="res-score" class="value">0</span>
                </div>
            </div>
        </div>
        <section id="dashboard-section">
    </section>

<section id="monitor-results-section" class="analysis-container" style="background: #050505;">
    <h2 style="color: #00e676; letter-spacing: 5px;">LIVE MONITORING</h2>
    
    <div id="results-display" class="results-grid">
        </div>

    <div id="system-log" style="font-family: monospace; color: #00e676; opacity: 0.6; margin-top: 20px;">
        > Initializing Data Stream...
    </div>
</section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="analysis.js"></script> 
</body>
</html>
